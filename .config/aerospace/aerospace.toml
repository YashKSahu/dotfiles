# ==========================================
# AeroSpace Configuration
# ==========================================

config-version = 2
start-at-login = true

# ------------------------------------------
# Startup
# ------------------------------------------

after-startup-command = []

# ------------------------------------------
# Layout
# ------------------------------------------
exec-on-workspace-change = [
  '/bin/bash', '-c', 
  '/opt/homebrew/opt/sketchybar/bin/sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE'
]


enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

accordion-padding = 30

# ------------------------------------------
# Behavior
# ------------------------------------------

on-focused-monitor-changed = ['move-mouse monitor-lazy-center']
# on-focus-changed = ['move-mouse window-lazy-center']

automatically-unhide-macos-hidden-apps = false

persistent-workspaces = []

on-mode-changed = []

[[on-window-detected]]
check-further-callbacks = true
run = 'layout tiling'

# ------------------------------------------
# Keyboard
# ------------------------------------------

[key-mapping]
preset = 'qwerty'

# ------------------------------------------
# Gaps
# ------------------------------------------

[gaps]
inner.horizontal = 8
inner.vertical   = 8

outer.top    = 5
outer.bottom = 8
outer.left   = 8
outer.right  = 8

# ==========================================
# Main Mode
# ==========================================

[mode.main.binding]

# ------------------------------------------
# Applications
# ------------------------------------------

#alt-enter = '''
#exec-and-forget osascript -e '
#if application "Terminal" is running then
#    tell application "Terminal"
#        do script ""
#        activate
#    end tell
#else
#    tell application "Terminal" to activate
#end if'
#'''
alt-enter = 'exec-and-forget open -a Terminal ~'

alt-shift-f = 'exec-and-forget open -a Firefox'
alt-shift-v = 'exec-and-forget open -a "Visual Studio Code"'
alt-shift-z = 'exec-and-forget open -a Zotero'
alt-shift-t = 'exec-and-forget open -a Finder'

# ------------------------------------------
# Window Management
# ------------------------------------------

alt-q = 'close --quit-if-last-window'
alt-f = 'macos-native-fullscreen'

alt-shift-space = 'layout floating tiling'

alt-shift-x = "exec-and-forget osascript -e 'tell application \"System Events\" to shut down'"

# ------------------------------------------
# Focus
# ------------------------------------------

alt-left  = 'focus left'
alt-down  = 'focus down'
alt-up    = 'focus up'
alt-right = 'focus right'

# ------------------------------------------
# Move Windows
# ------------------------------------------

alt-shift-left  = 'move left'
alt-shift-down  = 'move down'
alt-shift-up    = 'move up'
alt-shift-right = 'move right'

# ------------------------------------------
# Layouts
# ------------------------------------------

alt-b = 'layout horizontal'
alt-v = 'layout vertical'

alt-slash = 'layout tiles horizontal vertical'
alt-comma = 'layout accordion horizontal vertical'

# ------------------------------------------
# Resize
# ------------------------------------------

alt-minus = 'resize smart -50'
alt-equal = 'resize smart +50'

# ------------------------------------------
# Workspaces
# ------------------------------------------

alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'
alt-5 = 'workspace 5'
alt-6 = 'workspace 6'
alt-7 = 'workspace 7'
alt-8 = 'workspace 8'
alt-9 = 'workspace 9'
alt-0 = 'workspace 10'

alt-shift-1 = 'move-node-to-workspace 1'
alt-shift-2 = 'move-node-to-workspace 2'
alt-shift-3 = 'move-node-to-workspace 3'
alt-shift-4 = 'move-node-to-workspace 4'
alt-shift-5 = 'move-node-to-workspace 5'
alt-shift-6 = 'move-node-to-workspace 6'
alt-shift-7 = 'move-node-to-workspace 7'
alt-shift-8 = 'move-node-to-workspace 8'
alt-shift-9 = 'move-node-to-workspace 9'
alt-shift-0 = 'move-node-to-workspace 10'

alt-tab = 'workspace-back-and-forth'
alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'

# ------------------------------------------
# Config / Service Mode
# ------------------------------------------

alt-shift-c = 'reload-config'
alt-shift-semicolon = 'mode service'

# ==========================================
# Service Mode
# ==========================================

[mode.service.binding]

esc = ['reload-config', 'mode main']

# Reset workspace tree
r = ['flatten-workspace-tree', 'mode main']

# Toggle floating / tiling
f = ['layout floating tiling', 'mode main']

# Close all except focused window
backspace = ['close-all-windows-but-current', 'mode main']

# Join containers
alt-shift-left  = ['join-with left', 'mode main']
alt-shift-down  = ['join-with down', 'mode main']
alt-shift-up    = ['join-with up', 'mode main']
alt-shift-right = ['join-with right', 'mode main']
